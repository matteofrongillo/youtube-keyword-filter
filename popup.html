<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h2>Blocked Words</h2>
    <p>Enter words or phrases to hide from YouTube, separated by commas:</p>
    <textarea id="blacklist-input" rows="4" placeholder="e.g. ASMR, Minecraft, tutorial"></textarea>
    <div class="actions">
      <span id="status-message"></span>
      <button id="save-btn">Save</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
